[app]
name = "WAVER"
debug = true
host = "0.0.0.0"
port = 18021

[cors]
origins = ["*"]

[netease]
# For local development use: http://localhost:18012
# For Docker environment use: http://netease-api:3000
api_base = "http://localhost:18012"

[storage]
# Directory to store JSON files (legacy/backup)
path = "."
shared_waves_file = "shared_waves.json"
chat_messages_file = "chat_messages.json"

[database]
enabled = true
# Format: mysql+pymysql://user:password@host:port/dbname
# For Docker (External DB on Host): mysql+pymysql://root:111@host.docker.internal:3306/waver
url = "mysql+pymysql://root:111111@localhost:3306/waver"
name = "waver"
