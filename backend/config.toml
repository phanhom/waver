[app]
name = "WAVER"
debug = true
host = "0.0.0.0"
port = 19001

[cors]
origins = ["*"]

[netease]
# Default: localhost for local development
# Docker will override this via environment variable
api_base = "http://localhost:19002"

[storage]
# All data stored in .waver folder
path = ".waver"

[database]
enabled = true
# SQLite database path (stored in .waver folder)
url = "sqlite:///./.waver/waver.db"
name = "waver"
