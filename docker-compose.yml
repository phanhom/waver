services:
  netease-api:
    image: moefurina/ncm-api
    container_name: waver-netease-api
    ports:
      - "19002:3000"
    environment:
      - PORT=3000
      - http_proxy=
      - https_proxy=
      - no_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=
    restart: unless-stopped

  backend:
    image: waver-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waver-backend
    ports:
      - "19001:19001"
    volumes:
      - ./backend/config.toml:/app/config.toml
      - ./.waver:/app/.waver
    restart: unless-stopped
    depends_on:
      - netease-api
    environment:
      - NETEASE_API_BASE=http://netease-api:3000

  frontend:
    image: waver-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: waver-frontend
    ports:
      - "19000:19000"
    environment:
      - PORT=19000
    depends_on:
      - backend
    restart: unless-stopped
