services:
  netease-api:
    image: moefurina/ncm-api
    container_name: waver-netease-api
    ports:
      - "19002:3000"
    environment:
      - PORT=3000
      - http_proxy=
      - https_proxy=
      - no_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=
    restart: unless-stopped

  backend:
    image: waver-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waver-backend
    ports:
      - "19001:19001"
    volumes:
      - ./backend/config.toml:/app/config.toml
      # 与本地直跑一致：仓库根 .waver（与 backend、frontend 平级）；后端在容器内解析为 /app/.waver
      - ./.waver:/app/.waver
    restart: unless-stopped
    depends_on:
      - netease-api
    environment:
      - NETEASE_API_BASE=http://netease-api:3000

  frontend:
    image: waver-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: waver-frontend
    ports:
      - "19000:19000"
    # 前端页面只提供 Next；Socket.IO 在后端 19001。不要把 NEXT_PUBLIC_SOCKET_URL 指向前端端口，
    # 否则浏览器会请求 http://<前端>:<port>/socket.io 并得到 connection refused。
    # 留空即可：客户端会连 http://<当前访问的 hostname>:19001
    environment:
      - PORT=19000
    depends_on:
      - backend
    restart: unless-stopped
